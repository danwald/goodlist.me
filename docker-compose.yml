services:
  app:
    build: { context: ., dockerfile: Dockerfile }
    ports: ["3000:3000"]
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/goodlist_dev
      NEXTAUTH_URL: http://localhost:3000
    depends_on:
      postgres: { condition: service_healthy }

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: goodlist_dev
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
